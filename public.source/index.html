<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>JSON Site</title>
    <link rel="stylesheet" href="site.css">
  </head>
  <body>
    <main>
      <h1><database field="title"></database></h1>
      <p class="subtitle"><database field="subtitle"></database></p>
      <database field="coverImage"></database>
      <article>
        <database field="body"></database>
      </article>

      <nav aria-label="Published pages">
        <h2>Pages</h2>
        <database-list type="page"></database-list>
      </nav>
    </main>
  </body>
</html>
